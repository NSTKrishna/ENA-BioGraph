version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ena_db
    ports:
      - "5432:5432"

  puppygraph:
    image: puppygraph/puppygraph:stable
    container_name: puppygraph
    depends_on:
      - postgres
    ports:
      - "8081:8081"
      - "8182:8182"